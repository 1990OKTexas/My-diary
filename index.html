<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uranium Diary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .active { display: block; }
        
        /* Updated aesthetic to match Image Describer */
        body { background: #050505; min-height: 100vh; color: #fff; }
        
        .card-style { 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
        }

        .text-glow { color: #12ff78; text-shadow: 0 0 5px rgba(18, 255, 120, 0.5); }
        
        .logo-style {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -1px;
        }
        
        .btn-primary { background: #fff; color: #000; font-weight: bold; }
        .btn-primary:hover { opacity: 0.9; }

        /* Outlined Inputs */
        .input-box {
            background: transparent;
            border: 1px solid #333;
            padding: 1rem;
            border-radius: 8px;
            width: 100%;
            outline: none;
        }
        .input-box:focus { border-color: #12ff78; }
    </style>
</head>
<body class="p-4 font-mono">

    <div id="auth-page" class="page active max-w-sm mx-auto mt-20 card-style p-8 rounded-2xl text-center">
        <h2 class="text-xl font-bold mb-6 text-glow">VAULT_LOCKED</h2>
        <input type="password" id="pin-input" maxlength="4" class="w-32 bg-black text-center text-2xl font-bold py-3 mb-6 rounded-lg outline-none border border-gray-700" placeholder="••••">
        <button onclick="checkPin()" class="w-full py-3 btn-primary rounded-lg">UNLOCK</button>
    </div>

    <div id="list-page" class="page max-w-md mx-auto">
        <header class="flex justify-between items-center py-8">
            <h1 class="logo-style">DIARY</h1>
            <button onclick="openNewNote()" class="px-6 py-2 btn-primary rounded-lg">+</button>
        </header>
        <div id="notes-grid" class="grid grid-cols-1 gap-4"></div>
    </div>

    <div id="editor-page" class="page max-w-md mx-auto min-h-[90vh] mt-4">
        <div class="flex justify-between items-center mb-6">
            <button onclick="showList()" class="text-gray-400 hover:text-white">← BACK</button>
            <div id="action-btns" class="flex gap-4">
                <button onclick="enableEdit()" id="edit-btn" class="text-xl">✏️</button>
                <button onclick="saveNote()" id="publish-btn" class="hidden px-6 py-2 btn-primary rounded-lg text-sm">PUBLISH</button>
            </div>
        </div>
        
        <input type="text" id="note-title" placeholder="TITLE" readonly class="input-box text-xl font-bold mb-4">
        <textarea id="note-content" placeholder="ENTER NOTE CONTENT..." readonly class="input-box h-96 resize-none"></textarea>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('uranium-diary') || '[]');
        let editingIndex = -1;

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function checkPin() {
            if (document.getElementById('pin-input').value === '1990') {
                showPage('list-page');
                renderNotes();
            } else { alert('ACCESS_DENIED'); }
        }

        function renderNotes() {
            const grid = document.getElementById('notes-grid');
            grid.innerHTML = notes.map((n, i) => `
                <div onclick="viewNote(${i})" class="card-style p-5 rounded-xl cursor-pointer hover:border-gray-500 transition relative group">
                    <h3 class="font-bold text-white">${n.title}</h3>
                    <p class="text-xs text-gray-500">${n.date}</p>
                    <button onclick="event.stopPropagation(); deleteNote(${i})" class="absolute top-5 right-5 opacity-0 group-hover:opacity-100 text-red-500 text-xs">PURGE</button>
                </div>
            `).join('');
        }

        function viewNote(i) {
            editingIndex = i;
            document.getElementById('note-title').value = notes[i].title;
            document.getElementById('note-content').value = notes[i].content;
            document.getElementById('note-title').readOnly = true;
            document.getElementById('note-content').readOnly = true;
            document.getElementById('edit-btn').classList.remove('hidden');
            document.getElementById('publish-btn').classList.add('hidden');
            showPage('editor-page');
        }

        function openNewNote() {
            editingIndex = -1;
            document.getElementById('note-title').value = '';
            document.getElementById('note-content').value = '';
            document.getElementById('note-title').readOnly = false;
            document.getElementById('note-content').readOnly = false;
            document.getElementById('edit-btn').classList.add('hidden');
            document.getElementById('publish-btn').classList.remove('hidden');
            showPage('editor-page');
        }

        function enableEdit() {
            document.getElementById('note-title').readOnly = false;
            document.getElementById('note-content').readOnly = false;
            document.getElementById('edit-btn').classList.add('hidden');
            document.getElementById('publish-btn').classList.remove('hidden');
        }

        function saveNote() {
            const title = document.getElementById('note-title').value;
            const content = document.getElementById('note-content').value;
            if(!title) return alert('TITLE_REQUIRED');
            
            if(editingIndex > -1) {
                notes[editingIndex] = { title, content, date: new Date().toLocaleDateString() };
            } else {
                notes.unshift({ title, content, date: new Date().toLocaleDateString() });
            }
            localStorage.setItem('uranium-diary', JSON.stringify(notes));
            showList();
        }

        function deleteNote(i) {
            if(confirm('PURGE_ENTRY?')) {
                notes.splice(i, 1);
                localStorage.setItem('uranium-diary', JSON.stringify(notes));
                renderNotes();
            }
        }

        function showList() { showPage('list-page'); renderNotes(); }
    </script>
</body>
</html>
