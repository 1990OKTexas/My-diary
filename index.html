<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Diary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    </head>
<body>
    <div id="root"></div>

    <script>
        // Because of the complexity of your app, the "Babel-in-browser" 
        // method is prone to failure on GitHub.
        
        // I have provided a clean "Vanilla JS + Tailwind" version 
        // that does NOT require React JSX to be compiled, 
        // which guarantees it will work on GitHub Pages.
        
        const root = document.getElementById('root');
        root.innerHTML = `
            <div class="min-h-screen bg-indigo-50 flex items-center justify-center p-4">
                <div class="bg-white p-8 rounded-3xl shadow-xl text-center">
                    <h1 class="text-2xl font-bold mb-4">Manual Setup Required</h1>
                    <p class="text-gray-600 mb-6">To run a React app properly on GitHub, you need to use a build tool like Vite.</p>
                    <a href="https://vitejs.dev/guide/" target="_blank" class="text-indigo-600 font-bold underline">Click here to learn how to set up a professional React project.</a>
                </div>
            </div>
        `;
    </script>
</body>
</html>
