<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Diary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const { Plus, Camera, Bold, Italic, Underline, ChevronLeft, Save, Trash2, X, AlertTriangle, BookOpen, Lock } = lucide;

        function App() {
            const [notes, setNotes] = useState(() => JSON.parse(localStorage.getItem('journal-entries') || '[]'));
            const [view, setView] = useState('list');
            const [authenticated, setAuthenticated] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [currentNote, setCurrentNote] = useState(null);
            const [title, setTitle] = useState('');
            const [content, setContent] = useState('');
            const [image, setImage] = useState(null);
            const [format, setFormat] = useState({ bold: false, italic: false, underline: false });
            const [deleteId, setDeleteId] = useState(null);
            const fileInputRef = useRef(null);

            const SECRET_PIN = '1990';

            useEffect(() => { localStorage.setItem('journal-entries', JSON.stringify(notes)); }, [notes]);

            if (!authenticated) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-[2rem] shadow-2xl text-center w-full max-w-xs">
                            <Lock className="mx-auto text-indigo-600 mb-6" size={48} />
                            <h2 className="text-2xl font-black mb-6">Enter PIN</h2>
                            <input type="password" maxLength={4} value={pinInput} onChange={(e) => setPinInput(e.target.value)} className="w-full text-center text-4xl font-bold tracking-[1rem] py-4 mb-6 outline-none bg-zinc-100 rounded-2xl" />
                            <button onClick={() => pinInput === SECRET_PIN ? setAuthenticated(true) : setPinInput('')} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold">Unlock</button>
                        </div>
                    </div>
                );
            }

            const handleSave = () => {
                if (!title.trim()) return;
                const entry = { id: currentNote?.id || Date.now(), title, content, image, format, date: new Date().toLocaleDateString() };
                setNotes(currentNote ? notes.map(n => n.id === entry.id ? entry : n) : [entry, ...notes]);
                setView('list');
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 p-4 text-zinc-900 font-sans">
                    {deleteId && (
                        <div className="fixed inset-0 bg-zinc-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-xs text-center border-4 border-indigo-100">
                                <AlertTriangle className="mx-auto text-pink-500 mb-4" size={48} />
                                <h3 className="font-extrabold text-xl mb-2">Delete Entry?</h3>
                                <div className="flex gap-3">
                                    <button onClick={() => setDeleteId(null)} className="flex-1 py-3 rounded-2xl bg-zinc-100 font-bold">Cancel</button>
                                    <button onClick={() => { setNotes(notes.filter(n => n.id !== deleteId)); setDeleteId(null); }} className="flex-1 py-3 rounded-2xl bg-rose-500 text-white font-bold">Delete</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {view === 'list' ? (
                        <main className="max-w-md mx-auto space-y-6">
                            <header className="flex justify-between items-center py-4 px-2">
                                <h1 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">My Diary</h1>
                                <button onClick={() => { setCurrentNote(null); setTitle(''); setContent(''); setImage(null); setView('editor'); }} className="p-4 bg-indigo-600 text-white rounded-full"><Plus size={24} /></button>
                            </header>
                            <div className="grid grid-cols-2 gap-4">
                                {notes.map(note => (
                                    <div key={note.id} className="relative aspect-square rounded-3xl overflow-hidden bg-white shadow-lg">
                                        <button onClick={() => { setCurrentNote(note); setTitle(note.title); setContent(note.content); setImage(note.image); setFormat(note.format); setView('editor'); }} className="w-full h-full">
                                            {note.image ? <img src={note.image} className="w-full h-full object-cover" /> : <div className="flex items-center justify-center h-full text-indigo-200 bg-indigo-50"><BookOpen size={40} /></div>}
                                            <div className="absolute bottom-0 w-full p-4 bg-gradient-to-t from-black/80 to-transparent text-white text-sm font-extrabold truncate">{note.title}</div>
                                        </button>
                                        <button onClick={() => setDeleteId(note.id)} className="absolute top-3 right-3 p-2 bg-white/90 text-pink-500 rounded-full shadow-lg"><Trash2 size={16} /></button>
                                    </div>
                                ))}
                            </div>
                        </main>
                    ) : (
                        <div className="max-w-md mx-auto bg-white/80 backdrop-blur-xl rounded-[2rem] p-6 shadow-2xl min-h-[90vh] flex flex-col">
                            <nav className="flex justify-between items-center mb-6">
                                <button onClick={() => setView('list')} className="p-2 -ml-2 rounded-full hover:bg-zinc-100"><ChevronLeft size={24} /></button>
                                <button onClick={handleSave} className="px-6 py-3 bg-indigo-600 text-white rounded-full font-extrabold text-sm">Publish</button>
                            </nav>
                            <div className="flex items-center gap-2 mb-6 w-full">
                                <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="Title" className="min-w-0 flex-grow text-3xl font-black outline-none bg-transparent" />
                                <button onClick={() => fileInputRef.current.click()} className="flex-shrink-0 p-3 rounded-2xl bg-indigo-100 text-indigo-600"><Camera size={20} /></button>
                                <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={(e) => {
                                    const reader = new FileReader();
                                    reader.onload = (ev) => setImage(ev.target.result);
                                    reader.readAsDataURL(e.target.files[0]);
                                }} />
                            </div>
                            <div className="flex gap-2 mb-6 p-1 bg-zinc-100 rounded-2xl w-fit">
                                <button onClick={() => setFormat(p => ({...p, bold: !p.bold}))} className={`p-3 rounded-xl ${format.bold ? 'bg-white shadow text-indigo-600' : 'text-zinc-400'}`}><Bold size={18} /></button>
                                <button onClick={() => setFormat(p => ({...p, italic: !p.italic}))} className={`p-3 rounded-xl ${format.italic ? 'bg-white shadow text-indigo-600' : 'text-zinc-400'}`}><Italic size={18} /></button>
                                <button onClick={() => setFormat(p => ({...p, underline: !p.underline}))} className={`p-3 rounded-xl ${format.underline ? 'bg-white shadow text-indigo-600' : 'text-zinc-400'}`}><Underline size={18} /></button>
                            </div>
                            {image && <img src={image} className="w-full h-48 object-cover rounded-3xl mb-6" />}
                            <textarea value={content} onChange={(e) => setContent(e.target.value)} className="flex-grow w-full outline-none text-zinc-800 bg-transparent" style={{ fontWeight: format.bold ? '800' : '500', fontStyle: format.italic ? 'italic' : 'normal', textDecoration: format.underline ? 'underline' : 'none' }} placeholder="What's on your mind?" />
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
