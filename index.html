<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Diary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen text-zinc-900 font-sans p-4">

    <!-- 1. AUTH SCREEN -->
    <div id="auth-page" class="page active max-w-sm mx-auto mt-20 bg-white p-8 rounded-3xl shadow-lg text-center">
        <h2 class="text-xl font-bold mb-6 text-indigo-600">Enter PIN</h2>
        <input type="password" id="pin-input" maxlength="4" class="w-32 text-center text-2xl font-bold py-3 mb-6 bg-zinc-100 rounded-xl outline-none" placeholder="....">
        <button onclick="checkPin()" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition">Unlock</button>
    </div>

    <!-- 2. LIST SCREEN -->
    <div id="list-page" class="page max-w-md mx-auto">
        <header class="flex justify-between items-center py-6">
            <h1 class="text-3xl font-black">My Diary</h1>
            <button onclick="showEditor()" class="px-5 py-2 bg-indigo-600 text-white rounded-full font-bold shadow-lg hover:scale-105">+</button>
        </header>
        <div id="notes-grid" class="grid grid-cols-2 gap-4"></div>
    </div>

    <!-- 3. EDITOR SCREEN -->
    <div id="editor-page" class="page max-w-md mx-auto bg-white min-h-[90vh] rounded-3xl p-6 shadow-xl mt-4">
        <button onclick="showList()" class="mb-4 text-sm text-zinc-400">← Back</button>
        <input type="text" id="note-title" placeholder="Title..." class="w-full text-2xl font-bold mb-4 outline-none">
        <textarea id="note-content" class="w-full h-64 outline-none resize-none" placeholder="Write something..."></textarea>
        <button id="save-btn" onclick="saveNote()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold">Publish</button>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('my-diary') || '[]');
        let editingIndex = -1;

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function checkPin() {
            if (document.getElementById('pin-input').value === '1990') {
                showPage('list-page');
                renderNotes();
            } else { alert('Incorrect PIN!'); }
        }

        function renderNotes() {
            const grid = document.getElementById('notes-grid');
            grid.innerHTML = notes.map((n, i) => `
                <div onclick="editNote(${i})" class="bg-white p-4 rounded-2xl shadow-sm border border-zinc-100 cursor-pointer hover:border-indigo-200 relative">
                    <h3 class="font-bold truncate pr-6">${n.title}</h3>
                    <p class="text-xs text-zinc-400 mt-1">${n.date}</p>
                    <button onclick="event.stopPropagation(); deleteNote(${i})" class="absolute top-2 right-2 text-rose-500 text-[10px] font-bold">DELETE</button>
                </div>
            `).join('');
        }

        function editNote(i) {
            editingIndex = i;
            document.getElementById('note-title').value = notes[i].title;
            document.getElementById('note-content').value = notes[i].content;
            showPage('editor-page');
        }

        function saveNote() {
            const title = document.getElementById('note-title').value;
            const content = document.getElementById('note-content').value;
            if(!title) return alert('Title required');

            if(editingIndex > -1) {
                notes[editingIndex] = { title, content, date: new Date().toLocaleDateString() };
            } else {
                notes.unshift({ title, content, date: new Date().toLocaleDateString() });
            }
            
            localStorage.setItem('my-diary', JSON.stringify(notes));
            clearEditor();
            showList();
            renderNotes();
        }

        function clearEditor() {
            editingIndex = -1;
            document.getElementById('note-title').value = '';
            document.getElementById('note-content').value = '';
        }

        function deleteNote(i) {
            if(confirm('Delete this entry?')) {
                notes.splice(i, 1);
                localStorage.setItem('my-diary', JSON.stringify(notes));
                renderNotes();
            }
        }

        function showEditor() { clearEditor(); showPage('editor-page'); }
        function showList() { showPage('list-page'); }
    </script>
</body>
</html>
