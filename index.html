<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Diary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .active { display: block; }
        body { background: radial-gradient(circle at top right, #1e1b4b, #0f172a); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-white p-4 font-sans">

    <!-- 1. AUTH -->
    <div id="auth-page" class="page active max-w-sm mx-auto mt-20 glass p-8 rounded-3xl text-center shadow-2xl">
        <h2 class="text-2xl font-black mb-6 tracking-widest text-indigo-400">ACCESS GRANTED</h2>
        <input type="password" id="pin-input" maxlength="4" class="w-32 bg-white/10 text-center text-3xl font-bold py-3 mb-6 rounded-2xl outline-none border border-white/20" placeholder="••••">
        <button onclick="checkPin()" class="w-full py-4 bg-indigo-600 rounded-2xl font-bold hover:bg-indigo-500 transition shadow-lg shadow-indigo-900/50">UNLOCK VAULT</button>
    </div>

    <!-- 2. LIST -->
    <div id="list-page" class="page max-w-md mx-auto">
        <header class="flex justify-between items-center py-8">
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">JOURNAL</h1>
            <button onclick="showEditor()" class="p-4 bg-white/10 rounded-2xl hover:bg-white/20 transition">+</button>
        </header>
        <input type="text" oninput="filterNotes(this.value)" placeholder="Search entries..." class="w-full glass p-4 rounded-2xl mb-6 outline-none">
        <div id="notes-grid" class="grid grid-cols-1 gap-4"></div>
    </div>

    <!-- 3. EDITOR -->
    <div id="editor-page" class="page max-w-md mx-auto min-h-[90vh] mt-4">
        <div class="flex justify-between items-center mb-6">
            <button onclick="showList()" class="text-indigo-400">← Back</button>
            <span id="char-count" class="text-xs opacity-50">0 chars</span>
        </div>
        <input type="text" id="note-title" placeholder="Title..." class="w-full text-3xl font-bold mb-4 bg-transparent outline-none border-b border-white/10 pb-2">
        <textarea id="note-content" oninput="updateCharCount()" class="w-full h-96 bg-transparent outline-none resize-none mb-4" placeholder="Start writing..."></textarea>
        <button onclick="saveNote()" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-cyan-600 rounded-2xl font-bold shadow-xl shadow-cyan-900/20">SAVE ENTRY</button>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('my-diary') || '[]');
        let editingIndex = -1;

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function checkPin() {
            if (document.getElementById('pin-input').value === '1990') {
                showPage('list-page');
                renderNotes();
            } else { alert('Incorrect PIN'); }
        }

        function renderNotes(filter = '') {
            const grid = document.getElementById('notes-grid');
            const filtered = notes.filter(n => n.title.toLowerCase().includes(filter.toLowerCase()));
            grid.innerHTML = filtered.map((n, i) => `
                <div onclick="editNote(${i})" class="glass p-5 rounded-3xl cursor-pointer hover:bg-white/10 transition relative group">
                    <h3 class="font-bold text-lg">${n.title}</h3>
                    <p class="text-xs opacity-50 mt-1">${n.date}</p>
                    <button onclick="event.stopPropagation(); deleteNote(${i})" class="absolute top-5 right-5 opacity-0 group-hover:opacity-100 text-rose-400 text-xs font-bold transition">DELETE</button>
                </div>
            `).join('');
        }

        function filterNotes(val) { renderNotes(val); }
        function updateCharCount() { document.getElementById('char-count').innerText = document.getElementById('note-content').value.length + ' chars'; }
        
        function editNote(i) {
            editingIndex = i;
            document.getElementById('note-title').value = notes[i].title;
            document.getElementById('note-content').value = notes[i].content;
            updateCharCount();
            showPage('editor-page');
        }

        function saveNote() {
            const title = document.getElementById('note-title').value;
            const content = document.getElementById('note-content').value;
            if(!title) return alert('Title is required');
            if(editingIndex > -1) notes[editingIndex] = { title, content, date: new Date().toLocaleDateString() };
            else notes.unshift({ title, content, date: new Date().toLocaleDateString() });
            localStorage.setItem('my-diary', JSON.stringify(notes));
            clearEditor();
            showList();
            renderNotes();
        }

        function clearEditor() { editingIndex = -1; document.getElementById('note-title').value = ''; document.getElementById('note-content').value = ''; updateCharCount(); }
        function deleteNote(i) { if(confirm('Delete entry?')) { notes.splice(i, 1); localStorage.setItem('my-diary', JSON.stringify(notes)); renderNotes(); } }
        function showEditor() { clearEditor(); showPage('editor-page'); }
        function showList() { showPage('list-page'); }
    </script>
</body>
</html>
